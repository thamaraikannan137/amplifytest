version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - echo "No build step required for Node.js backend"
  artifacts:
    baseDirectory: .
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
